<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skeleton Layout - Colmar Academy</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 1. ส่วนแถบเมนูบนสุด -->
    <header class="navbar">
     <div class="logo">
        <img
          src="/22_phongphon-colmar/capstone_colmar_assets/capstone_colmar_assets/images/ic-logo.svg"
          alt="logo"
           <span>COLMAR<strong>ACADEMY</strong></span>
      </div>
      <nav class="nav-links">
        <span>Link 1</span>
        <span>Link 2</span>
        <span>Link 3</span>
        <span>Link 4</span>
      </nav>
    </header>

    <main>
      <!-- 2. ส่วน Hero (ซ้ายรูปใหญ่ ขวาข้อความ) -->
      <section class="hero-container">
        <div class="hero-left">Image Placeholder</div>
        <div class="hero-right">
          <div class="text-box">Content</div>
        </div>
      </section>

      <!-- 3. ส่วนข้อมูล (ซ้ายเนื้อหาหลัก ขวาลิสต์รายการย่อย) -->
      <section class="info-container">
        <div class="info-main-content">Main Feature</div>
        <div class="info-side-bar">
          <div class="side-item">Item 1</div>
          <div class="side-item">Item 2</div>
          <div class="side-item">Item 3</div>
        </div>
      </section>

      <!-- 4. ส่วนคอร์สเรียน (เรียง 3 คอลัมน์) -->
      <section class="courses-section">
        <div class="section-title">Title</div>
        <div class="courses-grid">
          <div class="course-card">Card 1</div>
          <div class="course-card">Card 2</div>
          <div class="course-card">Card 3</div>
          <div class="course-card">Card 4</div>
          <div class="course-card">Card 5</div>
          <div class="course-card">Card 6</div>
        </div>
      </section>
    </main>

    <!-- 5. ส่วนท้ายเว็บ -->
    <footer class="footer-container">
      <div>Copyright</div>
      <div>Links</div>
    </footer>
  </body>
</html>
